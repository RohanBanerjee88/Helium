name: Backend Unit Tests

on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglx-mesa0 \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6 \
            libgomp1

      - name: Install Python dependencies
        working-directory: backend
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          set +e
          pytest tests/ -v
          EXIT_CODE=$?
          # Open3D raises SIGABRT during interpreter shutdown (known upstream issue:
          # https://github.com/isl-org/Open3D/issues/6951). All tests complete before
          # this happens. Treat exit code 134 (128+SIGABRT) as success.
          if [ $EXIT_CODE -eq 134 ]; then exit 0; fi
          exit $EXIT_CODE
