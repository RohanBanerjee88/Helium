name: Tests

on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e "."

      - name: Check imports
        run: python -c "import helium; import helium.metrics; import helium.pipeline.runner; import helium.benchmarks.runner"
